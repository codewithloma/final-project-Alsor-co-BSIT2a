<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>DearBUP - Activity Tracker</title>

  <link rel="stylesheet" href="../CSS/style.css" />
  <link rel="stylesheet" href="../CSS/activity-tracker.css" />
  <link rel="stylesheet" href="../CSS/home.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
<!-- ── TOP NAVBAR (Tailwind) ───────────────────────────────── -->
<nav class="fixed top-0 left-0 right-0 z-[200] h-14 bg-[#242526] border-b border-white/[0.08] flex items-center px-4 gap-2">
 
  <!-- Logo -->
  <a href="#" class="flex items-center gap-2.5 flex-shrink-0 no-underline">
    <div class="w-9 h-9 rounded-full bg-gradient-to-br from-[#e06a72] to-[#d65d64] flex items-center justify-center overflow-hidden">
      <img src="../images/Logo.svg" alt="DearBUP" class="w-full h-full object-cover" />
    </div>
    <span class="text-[#e06a72] font-extrabold text-[17px] hidden sm:block">DearBUP</span>
  </a>
 
  <!-- Center tabs -->
  <div class="flex-1 flex justify-center gap-0.5">
 
    <a href="home.html"
       class="flex flex-col items-center justify-center w-[108px] h-[54px] gap-0.5
              text-white/45 text-[19px] no-underline
              border-b-[3px] border-transparent
              rounded-t-lg relative top-px
              hover:bg-white/5 hover:text-white/75
              transition-all duration-150
              [&.active]:text-[#e06a72] [&.active]:border-[#e06a72]"
       id="navHome">
      <i class="fas fa-home"></i>
      <span class="text-[10px] font-semibold">Home</span>
    </a>
 
    <a href="notification.html"
       class="flex flex-col items-center justify-center w-[108px] h-[54px] gap-0.5
              text-white/45 text-[19px] no-underline
              border-b-[3px] border-transparent
              rounded-t-lg relative top-px
              hover:bg-white/5 hover:text-white/75
              transition-all duration-150
              [&.active]:text-[#e06a72] [&.active]:border-[#e06a72]"
       id="navNotifs">
      <i class="fas fa-bell"></i>
      <span class="text-[10px] font-semibold">Notifs</span>
      <span class="notification-badge absolute top-2 right-[22px] min-w-[17px] h-[17px] px-1
                   bg-red-500 text-white text-[10px] font-bold rounded-full
                   hidden items-center justify-content border-2 border-[#242526]"
            id="notificationBadge"></span>
    </a>
 
    <a href="organization.html"
       class="flex flex-col items-center justify-center w-[108px] h-[54px] gap-0.5
              text-white/45 text-[19px] no-underline
              border-b-[3px] border-transparent
              rounded-t-lg relative top-px
              hover:bg-white/5 hover:text-white/75
              transition-all duration-150
              [&.active]:text-[#e06a72] [&.active]:border-[#e06a72]"
       id="navOrgs">
      <i class="fas fa-users"></i>
      <span class="text-[10px] font-semibold">Orgs</span>
    </a>
 
    <a href="activity-tracker.html"
       class="flex flex-col items-center justify-center w-[108px] h-[54px] gap-0.5
              text-white/45 text-[19px] no-underline
              border-b-[3px] border-transparent
              rounded-t-lg relative top-px
              hover:bg-white/5 hover:text-white/75
              transition-all duration-150
              [&.active]:text-[#e06a72] [&.active]:border-[#e06a72]"
       id="navActivity">
      <i class="fas fa-calendar-alt"></i>
      <span class="text-[10px] font-semibold">Activity</span>
    </a>
 
    <a href="profile.html"
       class="flex flex-col items-center justify-center w-[108px] h-[54px] gap-0.5
              text-white/45 text-[19px] no-underline
              border-b-[3px] border-transparent
              rounded-t-lg relative top-px
              hover:bg-white/5 hover:text-white/75
              transition-all duration-150
              [&.active]:text-[#e06a72] [&.active]:border-[#e06a72]"
       id="navProfile">
      <i class="fas fa-user"></i>
      <span class="text-[10px] font-semibold">Profile</span>
    </a>
 
  </div>
 
  <!-- Right side -->
  <div class="flex items-center gap-2 flex-shrink-0">
 
    <button id="logoutBtn" title="Logout"
            class="w-9 h-9 rounded-full bg-white/[0.08] border-none
                   text-white/80 text-[15px] cursor-pointer
                   flex items-center justify-center
                   hover:bg-white/[0.14] transition-colors duration-150">
      <i class="fas fa-sign-out-alt"></i>
    </button>
 
    <div id="navAvatar"
         class="w-9 h-9 rounded-full bg-gradient-to-br from-[#e06a72] to-[#d65d64]
                flex items-center justify-center
                text-white font-bold text-[13px] cursor-pointer overflow-hidden
                border-2 border-white/10">
      ?
    </div>
 
  </div>
</nav>

  <!-- Main Content -->
  <div class="main-content">
    <div class="page-wrapper">
      <div class="page-header">
        <h1>Activity Tracker</h1>
        <p>View upcoming campus activities and organization events.</p>
      </div>

      <div class="tracker-stats">
        <div class="tracker-stat-card">
          <span class="tracker-stat-num" id="totalUpcoming">0</span>
          <div class="tracker-stat-label">Upcoming Events</div>
        </div>

        <div class="tracker-stat-card">
          <span class="tracker-stat-num" id="todayEvents">0</span>
          <div class="tracker-stat-label">Today</div>
        </div>

        <div class="tracker-stat-card">
          <span class="tracker-stat-num" id="nextEventDate">--</span>
          <div class="tracker-stat-label">Nearest Event</div>
        </div>
      </div>

      <div class="tracker-section">
        <div class="tracker-section-header">
          <div>
            <h2 class="tracker-section-title">Upcoming Activities</h2>
            <p class="tracker-section-subtitle">Events are sorted chronologically.</p>
          </div>

          <button id="refreshEventsBtn" class="tracker-refresh-btn">
            <i class="fas fa-sync-alt"></i>
            Refresh
          </button>
        </div>

        <div id="eventList" class="tracker-event-list">
          <div class="tracker-empty">Loading events...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Event Details Modal -->
<div class="event-modal-overlay" id="eventModalOverlay">
  <div class="event-modal">
    <button class="event-modal-close" id="closeEventModal">
      <i class="fas fa-times"></i>
    </button>

    <div class="event-modal-header">
      <div class="event-modal-type" id="modalEventType">Event</div>
      <h2 id="modalEventTitle">Event Title</h2>
      <p id="modalEventOrg">Campus Organization</p>
    </div>

    <div class="event-modal-body">
      <p id="modalEventDesc"></p>

      <div class="event-modal-info">
        <div><i class="fas fa-calendar"></i> <span id="modalEventDate"></span></div>
        <div><i class="fas fa-clock"></i> <span id="modalEventTime"></span></div>
        <div><i class="fas fa-map-marker-alt"></i> <span id="modalEventVenue"></span></div>
        <div><i class="fas fa-calendar-check"></i> <span id="modalEventStatus"></span></div>
      </div>
    </div>
  </div>
</div>

  <script src="../js/activity-tracker.js"></script>

  <script>
  const page = window.location.pathname.split('/').pop();
  const map = {
    'home.html':             'navHome',
    'notification.html':     'navNotifs',
    'organization.html':     'navOrgs',
    'activity-tracker.html': 'navActivity',
    'profile.html':          'navProfile',
  };
  const id = map[page];
  if (id) {
    const el = document.getElementById(id);
    if (el) {
      el.classList.add('!text-[#e06a72]', '!border-[#e06a72]');
      el.classList.remove('text-white/45');
    }
  }

  // Navbar avatar
  const user = JSON.parse(localStorage.getItem('dearbup_user') || '{}');
  const av = document.getElementById('navAvatar');
  if (av && user.avatar_url) {
    av.innerHTML = `<img src="${user.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`;
  } else if (av && user.display_name) {
    av.textContent = user.display_name[0].toUpperCase();
  }

  // Logout
  document.getElementById('logoutBtn')?.addEventListener('click', () => {
    localStorage.removeItem('dearbup_token');
    localStorage.removeItem('dearbup_user');
    window.location.href = '../index.html';
  });
</script>
</body>
</html>
