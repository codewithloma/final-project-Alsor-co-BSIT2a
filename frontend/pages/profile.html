<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DearBUP – Profile</title>

  <link rel="stylesheet" href="../CSS/style.css" />
  <link rel="stylesheet" href="../CSS/sidebar.css" />
  <link rel="stylesheet" href="../CSS/profile.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
   <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

  <!-- ── Sidebar ───────────────────────────────────────────── -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="logo">
        <img src="../images/Logo.svg" class="logo-img" alt="DearBUP" />
        <span>DearBUP</span>
      </div>
    </div>

     <nav class="flex-1 px-6 space-y-2">
        <a
          href="home.html"
          class="flex items-center gap-5 px-4 py-3 rounded-xl text-gray-500 font-medium hover:text-[#d65d64] hover:bg-[#e0c0ac]/20 transition nav-item overflow-hidden"
        >
          <i class="fas fa-home w-6 text-lg"></i>

          <span>Home</span>
        </a>

        <a href="notification.html" class="nav-item" style="position: relative; overflow: hidden;">
          <i class="fas fa-bell w-6 text-lg"></i>
          <span>Notifications</span>
          <span 
            class="notification-badge" 
            id="notificationBadge" 
            style="display:none;"
          ></span>
        </a>

        <a
          href="profile.html"
          class="flex items-center gap-5 px-4 py-3 rounded-xl text-gray-500 font-medium hover:text-[#d65d64] hover:bg-[#e0c0ac]/20 transition nav-item active overflow-hidden"
        >
          <i class="fas fa-user w-6 text-lg"></i>

          <span>Profile</span>
        </a>

        <a
          href="organization.html"
          class="flex items-center gap-5 px-4 py-3 rounded-xl text-gray-500 font-medium hover:text-[#d65d64] hover:bg-[#e0c0ac]/20 transition nav-item overflow-hidden"
        >
          <i class="fas fa-users w-6 text-lg"></i>

          <span>Organizations</span>
        </a>
        
        <a
          href="activity-tracker.html"
          class="flex items-center gap-5 px-4 py-3 rounded-xl text-gray-500 font-medium hover:text-[#d65d64] hover:bg-[#e0c0ac]/20 transition nav-item overflow-hidden"
        >
          <i class="fas fa-calendar-alt w-6 text-lg"></i>
          <span>Activity Tracker</span>
        </a>
      </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebarAvatar">?</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name"   id="sidebarName">Loading…</div>
          <div class="sidebar-user-course" id="sidebarCourse"></div>
        </div>
        <button id="logoutBtn" class="sidebar-logout" title="Logout">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
      <a href="#" id="writePostBtn" class="write-post nav-item">
        <i class="fas fa-feather-alt"></i> Write
      </a>
    </div>
  </div>

  <button id="menuToggle" class="menu-toggle"><i class="fas fa-bars"></i></button>

  <!-- ── Main Content ──────────────────────────────────────── -->
  <div class="main-content" id="mainContent">

    <!-- Cover -->
    <div class="profile-cover" id="profileCover">
      <div class="cover-pattern"></div>
      </button>
    </div>

    <!-- Info Strip -->
    <div class="profile-info-strip">
      <div class="avatar-wrap">
        <div class="profile-avatar" id="profileAvatar">?</div>
      </div>

      <div class="profile-main-row">
        <div class="profile-name-block">
          <div class="profile-display-name" id="profileDisplayName">Loading…</div>
          <div class="profile-handle"       id="profileHandle">@…</div>
          <div class="profile-badges"       id="profileBadges"></div>
        </div>
        <div class="profile-actions">
          <button class="btn-edit-profile" id="editProfileBtn">
            <i class="fas fa-pen"></i> Edit Profile
          </button>
          <button class="btn-share" id="shareProfileBtn" title="Share profile">
            <i class="fas fa-share-alt"></i>
          </button>
        </div>
      </div>

      <p class="profile-bio" id="profileBio">No bio yet.</p>

      <div class="profile-stats-row">
        <div class="pstat" id="statPostsBtn">
          <span class="num" id="statPosts">—</span>
          <span class="lbl">Posts</span>
        </div>
        <div class="pstat">
          <span class="num" id="statLikes">—</span>
          <span class="lbl">Likes</span>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="profile-tabs">
      <button class="tab-btn active" data-tab="posts">
        <i class="fas fa-th-list"></i> Posts
      </button>
      <button class="tab-btn" data-tab="about">
        <i class="fas fa-info-circle"></i> About
      </button>
    </div>

    <!-- Tab Panels -->
    <div class="tab-content-wrap">

      <div class="tab-panel active" id="tab-posts">
        <div id="postsContainer">
          <div class="feed-loader">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Loading posts…</p>
          </div>
        </div>
      </div>

      <div class="tab-panel" id="tab-about">
        <div class="about-grid" id="aboutContainer">
          <div class="feed-loader" style="grid-column:1/-1">
            <i class="fas fa-spinner fa-spin"></i>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ── Edit Profile Modal ────────────────────────────────── -->
  <div class="modal-overlay" id="editModal">
    <div class="edit-modal">
      <div class="em-header">
        <h3><i class="fas fa-user-edit"></i> Edit Profile</h3>
        <button class="em-close" id="closeEditModal"><i class="fas fa-times"></i></button>
      </div>
       <div class="em-body">
        <div class="em-field">
          <label for="editDisplayName">Display Name</label>
          <input type="text" id="editDisplayName" placeholder="Your display name" maxlength="60" autocomplete="name" />
        </div>
        <div class="em-field">
          <label for="editBioInput">Bio</label>
          <textarea id="editBioInput" placeholder="Tell the BUP community about yourself…" maxlength="160"></textarea>
          <span class="char-hint"><span id="bioCharCount">0</span>/160</span>
        </div>
        <div class="em-field">
          <label>Profile Photo</label>
          <div class="avatar-upload-wrap" id="avatarUploadWrap">
            <div class="avatar-preview" id="avatarPreview"></div>
            <label for="avatarFileInput" class="avatar-upload-btn">
              <i class="fas fa-camera"></i> Choose Photo
            </label>
            <input type="file" id="avatarFileInput" accept="image/*" style="display:none;" />
            <p class="avatar-upload-hint" id="avatarUploadHint">No file chosen</p>
          </div>
          <input type="hidden" id="editAvatarUrl" />
        </div>
      </div>  

      <div class="em-footer">
        <button class="btn-cancel-em" id="cancelEditModal">Cancel</button>
        <button class="btn-save-em" id="saveProfileBtn">
          <i class="fas fa-check"></i> Save Changes
        </button>
      </div>
    </div>
  </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Comment Modal -->
<div class="modal-overlay" id="commentModal" style="display:none;">
  <div class="edit-modal" style="max-width:600px; padding:0; overflow:hidden;">

    <div id="commentModalPost" style="padding:16px 20px; border-bottom:1px solid rgba(255,255,255,0.1);"></div>

    <div style="padding:12px 20px; border-bottom:1px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between; align-items:center;">
      <span style="font-weight:700; font-size:16px; color:#fff;">Comments</span>
      <button class="em-close" id="closeCommentModal"><i class="fas fa-times"></i></button>
    </div>

    <div id="commentsList" style="max-height:300px; overflow-y:auto; padding:12px 20px; display:flex; flex-direction:column; gap:12px;"></div>

    <div style="display:flex; align-items:center; gap:8px; padding:12px 20px; border-top:1px solid rgba(255,255,255,0.1);">
      <div id="commentInputAvatar" style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#e06a72,#d65d64);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:13px;flex-shrink:0;overflow:hidden;"></div>
      <input type="text" id="commentInput" placeholder="Write a comment…" maxlength="200"
        style="flex:1;padding:10px 16px;border:none;border-radius:50px;background:#3a3b3c;color:#fff;font-family:inherit;font-size:14px;outline:none;" />
      <button id="commentSubmitBtn"
        style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#e06a72,#d65d64);color:white;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;">
        <i class="fas fa-paper-plane"></i>
      </button>
    </div>

  </div>
</div>

  <script src="../js/profile.js"></script>
</body>
</html>
