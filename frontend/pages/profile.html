<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DearBUP – Profile</title>

  <link rel="stylesheet" href="../CSS/style.css" />
  <link rel="stylesheet" href="../CSS/home.css" />
  <link rel="stylesheet" href="../CSS/profile.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
   <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<!-- ── TOP NAVBAR (Tailwind) ───────────────────────────────── -->
<nav class="fixed top-0 left-0 right-0 z-[200] h-14 bg-[#242526] border-b border-white/[0.08] flex items-center px-4 gap-2">
 
  <!-- Logo -->
  <a href="#" class="flex items-center gap-2.5 flex-shrink-0 no-underline">
    <div class="w-9 h-9 rounded-full bg-gradient-to-br from-[#e06a72] to-[#d65d64] flex items-center justify-center overflow-hidden">
      <img src="../images/Logo.svg" alt="DearBUP" class="w-full h-full object-cover" />
    </div>
    <span class="text-[#e06a72] font-extrabold text-[17px] hidden sm:block">DearBUP</span>
  </a>
 
  <!-- Center tabs -->
  <div class="flex-1 flex justify-center gap-0.5">
 
    <a href="home.html"
       class="flex flex-col items-center justify-center w-[108px] h-[54px] gap-0.5
              text-white/45 text-[19px] no-underline
              border-b-[3px] border-transparent
              rounded-t-lg relative top-px
              hover:bg-white/5 hover:text-white/75
              transition-all duration-150
              [&.active]:text-[#e06a72] [&.active]:border-[#e06a72]"
       id="navHome">
      <i class="fas fa-home"></i>
      <span class="text-[10px] font-semibold">Home</span>
    </a>
 
    <a href="notification.html"
       class="flex flex-col items-center justify-center w-[108px] h-[54px] gap-0.5
              text-white/45 text-[19px] no-underline
              border-b-[3px] border-transparent
              rounded-t-lg relative top-px
              hover:bg-white/5 hover:text-white/75
              transition-all duration-150
              [&.active]:text-[#e06a72] [&.active]:border-[#e06a72]"
       id="navNotifs">
      <i class="fas fa-bell"></i>
      <span class="text-[10px] font-semibold">Notifs</span>
      <span class="notification-badge absolute top-2 right-[22px] min-w-[17px] h-[17px] px-1
                   bg-red-500 text-white text-[10px] font-bold rounded-full
                   hidden items-center justify-content border-2 border-[#242526]"
            id="notificationBadge"></span>
    </a>
 
    <a href="organization.html"
       class="flex flex-col items-center justify-center w-[108px] h-[54px] gap-0.5
              text-white/45 text-[19px] no-underline
              border-b-[3px] border-transparent
              rounded-t-lg relative top-px
              hover:bg-white/5 hover:text-white/75
              transition-all duration-150
              [&.active]:text-[#e06a72] [&.active]:border-[#e06a72]"
       id="navOrgs">
      <i class="fas fa-users"></i>
      <span class="text-[10px] font-semibold">Orgs</span>
    </a>
 
    <a href="activity-tracker.html"
       class="flex flex-col items-center justify-center w-[108px] h-[54px] gap-0.5
              text-white/45 text-[19px] no-underline
              border-b-[3px] border-transparent
              rounded-t-lg relative top-px
              hover:bg-white/5 hover:text-white/75
              transition-all duration-150
              [&.active]:text-[#e06a72] [&.active]:border-[#e06a72]"
       id="navActivity">
      <i class="fas fa-calendar-alt"></i>
      <span class="text-[10px] font-semibold">Activity</span>
    </a>
 
    <a href="profile.html"
       class="flex flex-col items-center justify-center w-[108px] h-[54px] gap-0.5
              text-white/45 text-[19px] no-underline
              border-b-[3px] border-transparent
              rounded-t-lg relative top-px
              hover:bg-white/5 hover:text-white/75
              transition-all duration-150
              [&.active]:text-[#e06a72] [&.active]:border-[#e06a72]"
       id="navProfile">
      <i class="fas fa-user"></i>
      <span class="text-[10px] font-semibold">Profile</span>
    </a>
 
  </div>
 
  <!-- Right side -->
  <div class="flex items-center gap-2 flex-shrink-0">
 
    <button id="logoutBtn" title="Logout"
            class="w-9 h-9 rounded-full bg-white/[0.08] border-none
                   text-white/80 text-[15px] cursor-pointer
                   flex items-center justify-center
                   hover:bg-white/[0.14] transition-colors duration-150">
      <i class="fas fa-sign-out-alt"></i>
    </button>
 
    <div id="navAvatar"
         class="w-9 h-9 rounded-full bg-gradient-to-br from-[#e06a72] to-[#d65d64]
                flex items-center justify-center
                text-white font-bold text-[13px] cursor-pointer overflow-hidden
                border-2 border-white/10">
      ?
    </div>
 
  </div>
</nav>
  <!-- ── Main Content ──────────────────────────────────────── -->
  <div class="main-content" id="mainContent">

    <!-- Cover -->
    <div class="profile-cover" id="profileCover">
      <div class="cover-pattern"></div>
      </button>
    </div>

    <!-- Info Strip -->
    <div class="profile-info-strip">
      <div class="avatar-wrap">
        <div class="profile-avatar" id="profileAvatar">?</div>
      </div>

      <div class="profile-main-row">
        <div class="profile-name-block">
          <div class="profile-display-name" id="profileDisplayName">Loading…</div>
          <div class="profile-handle"       id="profileHandle">@…</div>
          <div class="profile-badges"       id="profileBadges"></div>
        </div>
        <div class="profile-actions">
          <button class="btn-edit-profile" id="editProfileBtn">
            <i class="fas fa-pen"></i> Edit Profile
          </button>
          <button class="btn-share" id="shareProfileBtn" title="Share profile">
            <i class="fas fa-share-alt"></i>
          </button>
        </div>
      </div>

      <p class="profile-bio" id="profileBio">No bio yet.</p>

      <div class="profile-stats-row">
        <div class="pstat" id="statPostsBtn">
          <span class="num" id="statPosts">—</span>
          <span class="lbl">Posts</span>
        </div>
        <div class="pstat">
          <span class="num" id="statLikes">—</span>
          <span class="lbl">Likes</span>
        </div>
      </div>
    </div>

    <!-- Tabs -->
<div class="profile-tabs">
  <button class="tab-btn active" data-tab="posts">
    <i class="fas fa-th-list"></i> Posts
  </button>
</div>

    <!-- Tab Panels -->
    <div class="tab-content-wrap">

<div class="tab-panel active" id="tab-posts">

  <div class="profile-content-layout">

    <!-- LEFT SIDE -->
    <div class="profile-about-side">
      <div class="about-grid" id="aboutContainer">
        <div class="feed-loader" style="grid-column:1/-1">
          <i class="fas fa-spinner fa-spin"></i>
        </div>
      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="profile-posts-side">
      <div id="postsContainer">
      </div>
    </div>

  </div>
</div>

  <!-- ── Edit Profile Modal ────────────────────────────────── -->
  <div class="modal-overlay" id="editModal">
    <div class="edit-modal">
      <div class="em-header">
        <h3><i class="fas fa-user-edit"></i> Edit Profile</h3>
        <button class="em-close" id="closeEditModal"><i class="fas fa-times"></i></button>
      </div>
       <div class="em-body">
        <div class="em-field">
          <label for="editDisplayName">Display Name</label>
          <input type="text" id="editDisplayName" placeholder="Your display name" maxlength="60" autocomplete="name" />
        </div>
        <div class="em-field">
          <label for="editBioInput">Bio</label>
          <textarea id="editBioInput" placeholder="Tell the BUP community about yourself…" maxlength="160"></textarea>
          <span class="char-hint"><span id="bioCharCount">0</span>/160</span>
        </div>
        <div class="em-field">
          <label>Profile Photo</label>
          <div class="avatar-upload-wrap" id="avatarUploadWrap">
            <div class="avatar-preview" id="avatarPreview"></div>
            <label for="avatarFileInput" class="avatar-upload-btn">
              <i class="fas fa-camera"></i> Choose Photo
            </label>
            <input type="file" id="avatarFileInput" accept="image/*" style="display:none;" />
            <p class="avatar-upload-hint" id="avatarUploadHint">No file chosen</p>
          </div>
          <input type="hidden" id="editAvatarUrl" />
        </div>
      </div>  

      <div class="em-footer">
        <button class="btn-cancel-em" id="cancelEditModal">Cancel</button>
        <button class="btn-save-em" id="saveProfileBtn">
          <i class="fas fa-check"></i> Save Changes
        </button>
      </div>
    </div>
  </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Comment Modal -->
<div class="modal-overlay" id="commentModal" style="display:none; position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,0.6); align-items:center; justify-content:center;">
  <div class="edit-modal" style="max-width:600px; width:90%; padding:0; overflow:hidden;" onclick="event.stopPropagation()">

    <div class="comment-modal-post" id="commentModalPost"></div>

    <div style="padding:12px 20px; border-bottom:1px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between; align-items:center;">
      <span style="font-weight:700; font-size:16px; color:#fff;">Comments</span>
      <button class="em-close" id="closeCommentModal"><i class="fas fa-times"></i></button>
    </div>

    <div id="commentsList" style="max-height:300px; overflow-y:auto; padding:12px 20px; display:flex; flex-direction:column; gap:12px;"></div>

    <div style="display:flex; align-items:center; gap:8px; padding:12px 20px; border-top:1px solid rgba(255,255,255,0.1);">
      <div id="commentInputAvatar" style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#e06a72,#d65d64);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:13px;flex-shrink:0;overflow:hidden;"></div>
      <input type="text" id="commentInput" placeholder="Write a comment…" maxlength="200"
        style="flex:1;padding:10px 16px;border:none;border-radius:50px;background:#3a3b3c;color:#fff;font-family:inherit;font-size:14px;outline:none;" />
      <button id="commentSubmitBtn"
        style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#e06a72,#d65d64);color:white;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;">
        <i class="fas fa-paper-plane"></i>
      </button>
    </div>

  </div>
</div>

<!-- Edit Post Modal -->
<div class="modal" id="editPostModal">
  <div class="modal-content edit-modal-content">
    <div class="edit-modal-header">
      <h3><i class="fas fa-pen" style="color:#e06a72;margin-right:8px;"></i>Edit post</h3>
      <button class="close-modal" id="closeEditPostModal">&times;</button>
    </div>
    <div class="edit-modal-body">
      <textarea id="editPostContent" maxlength="280" placeholder="What's on your mind?"></textarea>
      <div class="edit-char-counter"><span id="editPostCharCount">0</span>/280</div>
    </div>
    <div class="edit-modal-footer">
      <button class="edit-cancel-btn" id="cancelEditPostModal">Cancel</button>
      <button class="edit-save-btn" id="saveEditPostBtn">
        <i class="fas fa-check"></i> Save Changes
      </button>
    </div>
  </div>
</div>

<!-- Delete Post Modal -->
<div class="modal" id="deletePostModal">
  <div class="modal-content delete-modal-content">
    <div class="delete-modal-icon">
      <i class="fas fa-trash-alt"></i>
    </div>
    <div class="delete-modal-body">
      <h3>Delete post?</h3>
      <p>This will be permanently deleted and cannot be undone.</p>
    </div>
    <div class="delete-modal-footer">
      <button class="delete-cancel-btn" id="cancelDeletePostModal">Cancel</button>
      <button class="delete-confirm-btn" id="confirmDeletePostBtn">
        <i class="fas fa-trash-alt"></i> Delete
      </button>
    </div>
  </div>
</div>
<div id="logoutModal" style="
    display:none; position:fixed; inset:0; z-index:9999;
    background:rgba(0,0,0,0.65); backdrop-filter:blur(12px);
    align-items:center; justify-content:center; padding:20px;">
  <div style="
      background:#242526; border-radius:20px; width:100%; max-width:380px;
      padding:32px 28px; text-align:center;
      box-shadow:0 24px 60px rgba(0,0,0,0.5);
      border:1px solid rgba(255,255,255,0.08);
      transform:scale(0.9); transition:transform 0.25s cubic-bezier(0.4,0,0.2,1);"
      id="logoutModalBox">

    <div style="
        width:64px; height:64px; border-radius:50%;
        background:rgba(224,106,114,0.12);
        display:flex; align-items:center; justify-content:center;
        margin:0 auto 18px;">
      <i class="fas fa-sign-out-alt" style="font-size:26px; color:#e06a72;"></i>
    </div>

    <h3 style="color:#fff; font-size:18px; font-weight:700; margin-bottom:8px;">
      Log out?
    </h3>
    <p style="color:rgba(255,255,255,0.5); font-size:13px; line-height:1.6; margin-bottom:24px;">
      Are you sure you want to log out of DearBUP?
    </p>

    <div style="display:flex; gap:10px;">
      <button id="logoutCancelBtn" style="
          flex:1; padding:11px; border-radius:10px;
          background:rgba(255,255,255,0.08); border:none;
          color:rgba(255,255,255,0.7); font-family:inherit;
          font-size:14px; font-weight:600; cursor:pointer;
          transition:background 0.2s;">
        Cancel
      </button>
      <button id="logoutConfirmBtn" style="
          flex:1; padding:11px; border-radius:10px;
          background:linear-gradient(135deg,#e06a72,#d65d64); border:none;
          color:white; font-family:inherit;
          font-size:14px; font-weight:600; cursor:pointer;
          transition:all 0.2s; box-shadow:0 4px 14px rgba(214,93,100,0.3);">
        <i class="fas fa-sign-out-alt"></i> Log out
      </button>
    </div>
  </div>
</div>
  <script type="module" src="../js/profile.js"></script>

  <script>
  const page = window.location.pathname.split('/').pop();
  const map = {
    'home.html':             'navHome',
    'notification.html':     'navNotifs',
    'organization.html':     'navOrgs',
    'activity-tracker.html': 'navActivity',
    'profile.html':          'navProfile',
  };
  const id = map[page];
  if (id) {
    const el = document.getElementById(id);
    if (el) {
      el.classList.add('!text-[#e06a72]', '!border-[#e06a72]');
      el.classList.remove('text-white/45');
    }
  }

  // Navbar avatar
  const user = JSON.parse(localStorage.getItem('dearbup_user') || '{}');
  const av = document.getElementById('navAvatar');
  if (av && user.avatar_url) {
    av.innerHTML = `<img src="${user.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`;
  } else if (av && user.display_name) {
    av.textContent = user.display_name[0].toUpperCase();
  }
</script>
</body>
</html>
