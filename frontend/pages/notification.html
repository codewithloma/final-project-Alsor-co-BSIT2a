<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DearBUP – Notifications</title>

  <link rel="stylesheet" href="../CSS/style.css" />
  <link rel="stylesheet" href="../CSS/notification.css" />
  <link rel="stylesheet" href="../CSS/home.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

  <!-- ── Sidebar ───────────────────────────────────────────── -->
<!-- ── TOP NAVBAR (Tailwind) ───────────────────────────────── -->
<nav class="fixed top-0 left-0 right-0 z-[200] h-14 bg-[#242526] border-b border-white/[0.08] flex items-center px-4 gap-2">
 
  <!-- Logo -->
  <a href="#" class="flex items-center gap-2.5 flex-shrink-0 no-underline">
    <div class="w-9 h-9 rounded-full bg-gradient-to-br from-[#e06a72] to-[#d65d64] flex items-center justify-center overflow-hidden">
      <img src="../images/Logo.svg" alt="DearBUP" class="w-full h-full object-cover" />
    </div>
    <span class="text-[#e06a72] font-extrabold text-[17px] hidden sm:block">DearBUP</span>
  </a>
 
  <!-- Center tabs -->
  <div class="flex-1 flex justify-center gap-0.5">
 
    <a href="home.html"
       class="flex flex-col items-center justify-center w-[108px] h-[54px] gap-0.5
              text-white/45 text-[19px] no-underline
              border-b-[3px] border-transparent
              rounded-t-lg relative top-px
              hover:bg-white/5 hover:text-white/75
              transition-all duration-150
              [&.active]:text-[#e06a72] [&.active]:border-[#e06a72]"
       id="navHome">
      <i class="fas fa-home"></i>
      <span class="text-[10px] font-semibold">Home</span>
    </a>
 
    <a href="notification.html"
       class="flex flex-col items-center justify-center w-[108px] h-[54px] gap-0.5
              text-white/45 text-[19px] no-underline
              border-b-[3px] border-transparent
              rounded-t-lg relative top-px
              hover:bg-white/5 hover:text-white/75
              transition-all duration-150
              [&.active]:text-[#e06a72] [&.active]:border-[#e06a72]"
       id="navNotifs">
      <i class="fas fa-bell"></i>
      <span class="text-[10px] font-semibold">Notifs</span>
      <span class="notification-badge absolute top-2 right-[22px] min-w-[17px] h-[17px] px-1
                   bg-red-500 text-white text-[10px] font-bold rounded-full
                   hidden items-center justify-content border-2 border-[#242526]"
            id="notificationBadge"></span>
    </a>
 
    <a href="organization.html"
       class="flex flex-col items-center justify-center w-[108px] h-[54px] gap-0.5
              text-white/45 text-[19px] no-underline
              border-b-[3px] border-transparent
              rounded-t-lg relative top-px
              hover:bg-white/5 hover:text-white/75
              transition-all duration-150
              [&.active]:text-[#e06a72] [&.active]:border-[#e06a72]"
       id="navOrgs">
      <i class="fas fa-users"></i>
      <span class="text-[10px] font-semibold">Orgs</span>
    </a>
 
    <a href="activity-tracker.html"
       class="flex flex-col items-center justify-center w-[108px] h-[54px] gap-0.5
              text-white/45 text-[19px] no-underline
              border-b-[3px] border-transparent
              rounded-t-lg relative top-px
              hover:bg-white/5 hover:text-white/75
              transition-all duration-150
              [&.active]:text-[#e06a72] [&.active]:border-[#e06a72]"
       id="navActivity">
      <i class="fas fa-calendar-alt"></i>
      <span class="text-[10px] font-semibold">Activity</span>
    </a>
 
    <a href="profile.html"
       class="flex flex-col items-center justify-center w-[108px] h-[54px] gap-0.5
              text-white/45 text-[19px] no-underline
              border-b-[3px] border-transparent
              rounded-t-lg relative top-px
              hover:bg-white/5 hover:text-white/75
              transition-all duration-150
              [&.active]:text-[#e06a72] [&.active]:border-[#e06a72]"
       id="navProfile">
      <i class="fas fa-user"></i>
      <span class="text-[10px] font-semibold">Profile</span>
    </a>
 
  </div>
 
  <!-- Right side -->
  <div class="flex items-center gap-2 flex-shrink-0">
 
    <button id="logoutBtn" title="Logout"
            class="w-9 h-9 rounded-full bg-white/[0.08] border-none
                   text-white/80 text-[15px] cursor-pointer
                   flex items-center justify-center
                   hover:bg-white/[0.14] transition-colors duration-150">
      <i class="fas fa-sign-out-alt"></i>
    </button>
 
    <div id="navAvatar"
         class="w-9 h-9 rounded-full bg-gradient-to-br from-[#e06a72] to-[#d65d64]
                flex items-center justify-center
                text-white font-bold text-[13px] cursor-pointer overflow-hidden
                border-2 border-white/10">
      ?
    </div>
 
  </div>
</nav>

  <!-- ── Main Content ──────────────────────────────────────── -->
  <div class="main-content">
    <div class="notif-wrapper">

      <!-- Page Header -->
      <div class="notif-page-header">
        <div class="notif-header-left">
          <h1>Notifications</h1>
          <span class="notif-unread-badge" id="unreadBadge" style="display:none;">0</span>
        </div>
        <button class="btn-mark-all" id="markAllBtn" style="display:none;">
          <i class="fas fa-check-double"></i> Mark all as read
        </button>
      </div>

      <!-- Filter Tabs -->
      <div class="notif-filter-row">
        <button class="notif-filter active" data-filter="all">All</button>
        <button class="notif-filter" data-filter="reaction">
          <i class="fas fa-heart"></i> Reactions
        </button>
        <button class="notif-filter" data-filter="comment">
          <i class="fas fa-comment"></i> Comments
        </button>
        <button class="notif-filter" data-filter="share">
          <i class="fas fa-share"></i> Shares
        </button>
        <button class="notif-filter" data-filter="event">
          <i class="fas fa-calendar"></i> Events
        </button>
        <button class="notif-filter" data-filter="organization">
          <i class="fas fa-users"></i> Organizations
        </button>
      </div>

      <!-- Notification List -->
      <div class="notif-list" id="notifList">
        <div class="notif-loader">
          <i class="fas fa-spinner fa-spin"></i>
          <p>Loading notifications…</p>
        </div>
      </div>

    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>
<div id="logoutModal" style="
    display:none; position:fixed; inset:0; z-index:9999;
    background:rgba(0,0,0,0.65); backdrop-filter:blur(12px);
    align-items:center; justify-content:center; padding:20px;">
  <div style="
      background:#242526; border-radius:20px; width:100%; max-width:380px;
      padding:32px 28px; text-align:center;
      box-shadow:0 24px 60px rgba(0,0,0,0.5);
      border:1px solid rgba(255,255,255,0.08);
      transform:scale(0.9); transition:transform 0.25s cubic-bezier(0.4,0,0.2,1);"
      id="logoutModalBox">

    <div style="
        width:64px; height:64px; border-radius:50%;
        background:rgba(224,106,114,0.12);
        display:flex; align-items:center; justify-content:center;
        margin:0 auto 18px;">
      <i class="fas fa-sign-out-alt" style="font-size:26px; color:#e06a72;"></i>
    </div>

    <h3 style="color:#fff; font-size:18px; font-weight:700; margin-bottom:8px;">
      Log out?
    </h3>
    <p style="color:rgba(255,255,255,0.5); font-size:13px; line-height:1.6; margin-bottom:24px;">
      Are you sure you want to log out of DearBUP?
    </p>

    <div style="display:flex; gap:10px;">
      <button id="logoutCancelBtn" style="
          flex:1; padding:11px; border-radius:10px;
          background:rgba(255,255,255,0.08); border:none;
          color:rgba(255,255,255,0.7); font-family:inherit;
          font-size:14px; font-weight:600; cursor:pointer;
          transition:background 0.2s;">
        Cancel
      </button>
      <button id="logoutConfirmBtn" style="
          flex:1; padding:11px; border-radius:10px;
          background:linear-gradient(135deg,#e06a72,#d65d64); border:none;
          color:white; font-family:inherit;
          font-size:14px; font-weight:600; cursor:pointer;
          transition:all 0.2s; box-shadow:0 4px 14px rgba(214,93,100,0.3);">
        <i class="fas fa-sign-out-alt"></i> Log out
      </button>
    </div>
  </div>
</div>
  <!-- notif-badge runs first to avoid badge showing on this page -->
  <script type="module" src="../js/notification.js"></script>

  <script>
  const page = window.location.pathname.split('/').pop();
  const map = {
    'home.html':             'navHome',
    'notification.html':     'navNotifs',
    'organization.html':     'navOrgs',
    'activity-tracker.html': 'navActivity',
    'profile.html':          'navProfile',
  };
  const id = map[page];
  if (id) {
    const el = document.getElementById(id);
    if (el) {
      el.classList.add('!text-[#e06a72]', '!border-[#e06a72]');
      el.classList.remove('text-white/45');
    }
  }

  // Navbar avatar
  const user = JSON.parse(localStorage.getItem('dearbup_user') || '{}');
  const av = document.getElementById('navAvatar');
  if (av && user.avatar_url) {
    av.innerHTML = `<img src="${user.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`;
  } else if (av && user.display_name) {
    av.textContent = user.display_name[0].toUpperCase();
  }

</script>
</body>
</html>
