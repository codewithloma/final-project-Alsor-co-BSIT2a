<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DearBUP – All Letters</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../CSS/letterfull.css" />
</head>
<body>

<div class="bg-blobs"></div>

<div class="topbar">
  <a href="home.html" class="topbar-logo">
    <img src="../images/Logo.svg" alt="DearBUP" />
    DearBUP
  </a>
  <span class="topbar-title">/ All Letters</span>
  <button class="topbar-back" onclick="window.close()">
    <i class="fas fa-times"></i> Close
  </button>
</div>

<div class="main">
  <div class="page-header">
    <h1><i class="fas fa-feather-alt" style="color:var(--accent);font-size:28px;margin-right:10px;"></i>Letters</h1>
    <p>Words from the BUP community — heartfelt, honest, and shared.</p>
  </div>

  <div class="filter-tabs">
    <button class="filter-tab active" data-filter="all">All</button>
    <button class="filter-tab general"    data-filter="general">General</button>
    <button class="filter-tab confession" data-filter="confession">Confession</button>
    <button class="filter-tab gratitude"  data-filter="gratitude">Gratitude</button>
    <button class="filter-tab concern"    data-filter="concern">Concern</button>
  </div>

  <div class="letters-grid" id="lettersGrid">
    <div class="state-msg">
      <div class="spinner"></div>
      <p>Loading letters…</p>
    </div>
  </div>
</div>

<script src="../js/letterfull.js"></script>
</body>
</html>
